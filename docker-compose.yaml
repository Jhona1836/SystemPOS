

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - pos_network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: pos_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pos_abarrotes
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: pos_password
      MYSQL_USER: pos_user
    volumes:
      - pos_db_data:/var/lib/mysql  #Esto es funcional para que la BD no se pierda cuando se apaga la maquina virtual
      - ./docker/mysql/database.sql:/docker-entrypoint-initdb.d/database.sql #Funciona para que incie la BD cuanod el contenedor inicie
    networks:
      - pos_network

  nginx:
    image: nginx:alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pos_network
    depends_on:
      - app

networks:
  pos_network:
    driver: bridge

volumes:
  pos_db_data:
    driver: local
